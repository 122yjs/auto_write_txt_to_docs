name: Release Windows Portable

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload
        required: true
        default: v1.0.2

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Resolve ref and tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Materialize bundled developer credentials
        shell: pwsh
        env:
          PRIVATE_DEVELOPER_CREDENTIALS_JSON: ${{ secrets.PRIVATE_DEVELOPER_CREDENTIALS_JSON }}
        run: |
          if (-not $env:PRIVATE_DEVELOPER_CREDENTIALS_JSON) {
            throw "Missing PRIVATE_DEVELOPER_CREDENTIALS_JSON secret."
          }

          $targetPath = "src/auto_write_txt_to_docs/assets/developer_credentials.json"
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($targetPath, $env:PRIVATE_DEVELOPER_CREDENTIALS_JSON, $utf8NoBom)

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build Windows portable package
        shell: pwsh
        run: .\scripts\build_release.ps1 -PythonExe python

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload ${{ steps.vars.outputs.tag }} .\release\MessengerDocsAutoWriter-win64-portable.zip --clobber
          gh release upload ${{ steps.vars.outputs.tag }} .\release\MessengerDocsAutoWriter-standalone.exe --clobber
          gh release upload ${{ steps.vars.outputs.tag }} .\src\auto_write_txt_to_docs\assets\developer_credentials.json.example --clobber
