name: Release Windows Portable

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload
        required: true
        default: v0.3.0

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest

    steps:
      - name: Resolve ref and tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build Windows portable package
        shell: pwsh
        run: .\scripts\build_release.ps1 -PythonExe python

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload ${{ steps.vars.outputs.tag }} .\release\MessengerDocsAutoWriter-win64-portable.zip --clobber
